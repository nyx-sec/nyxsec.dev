<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Nyx - local-first security scanner for developers">

  <!-- Warm editorial background -->
  <rect width="1200" height="630" fill="#F9F8F4"/>

  <!-- Forest green top accent bar -->
  <rect x="0" y="0" width="1200" height="7" fill="#0B3D2A"/>

  <!-- Inner editorial frame -->
  <rect x="14" y="14" width="1172" height="602" rx="3" fill="none" stroke="#E5E1D7" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="72" y="112"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="16" font-weight="700" letter-spacing="3.5" fill="#6C6660">OPEN-SOURCE · RUST · GPL-3.0</text>

  <!-- Rule below eyebrow -->
  <rect x="72" y="128" width="616" height="1" fill="#E5E1D7"/>

  <!-- Nyx - large italic editorial serif -->
  <text x="72" y="290"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="200" font-weight="700"
        letter-spacing="-4" fill="#0D0C0A">Nyx</text>

  <!-- Tagline -->
  <text x="72" y="393"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="26" font-weight="400" fill="#3C3830">Local-first security scanning for developers.</text>

  <!-- Facts row -->
  <text x="72" y="442"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="19" fill="#6C6660">Source-to-sink analysis · Browser triage UI · SARIF for CI</text>

  <!-- Bottom rule -->
  <rect x="72" y="548" width="616" height="1" fill="#E5E1D7"/>

  <!-- Domain -->
  <text x="72" y="580"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="18" font-weight="500" fill="#9C9690">nyxscan.dev</text>


  <!-- ── Terminal panel ── -->

  <!-- Terminal background -->
  <rect x="752" y="56" width="394" height="520" rx="12"
        fill="#0D0E12" stroke="#252830" stroke-width="1"/>

  <!-- Titlebar (top rounded) -->
  <rect x="752" y="56" width="394" height="38" rx="12" fill="#181A21"/>
  <!-- Fill in bottom radius of titlebar -->
  <rect x="752" y="80" width="394" height="14" fill="#181A21"/>

  <!-- Traffic lights -->
  <circle cx="782" cy="75" r="6" fill="#EE5653"/>
  <circle cx="804" cy="75" r="6" fill="#E8BB3B"/>
  <circle cx="826" cy="75" r="6" fill="#56C554"/>

  <!-- Titlebar separator -->
  <rect x="752" y="94" width="394" height="1" fill="#252830"/>

  <!-- Command 1 -->
  <text x="777" y="131" font-family="Menlo, 'SF Mono', Consolas, monospace" font-size="13.5" fill="#4E7060">$</text>
  <text x="793" y="131" font-family="Menlo, 'SF Mono', Consolas, monospace" font-size="13.5" fill="#C8E8D8">cargo install nyx-scanner</text>
  <text x="793" y="151" font-family="Menlo, 'SF Mono', Consolas, monospace" font-size="12" fill="#364E44">  Installing nyx-scanner v0.9.2</text>
  <text x="793" y="168" font-family="Menlo, 'SF Mono', Consolas, monospace" font-size="12" fill="#364E44">  Finished in 43.2s</text>

  <!-- Command 2 -->
  <text x="777" y="200" font-family="Menlo, 'SF Mono', Consolas, monospace" font-size="13.5" fill="#4E7060">$</text>
  <text x="793" y="200" font-family="Menlo, 'SF Mono', Consolas, monospace" font-size="13.5" fill="#C8E8D8">nyx scan</text>
  <text x="793" y="220" font-family="Menlo, 'SF Mono', Consolas, monospace" font-size="12" fill="#364E44">  Scanning 1,247 source files</text>
  <text x="793" y="238" font-family="Menlo, 'SF Mono', Consolas, monospace" font-size="12" fill="#B05848">  3 findings  (2 HIGH, 1 MEDIUM)</text>

  <!-- Command 3 -->
  <text x="777" y="270" font-family="Menlo, 'SF Mono', Consolas, monospace" font-size="13.5" fill="#4E7060">$</text>
  <text x="793" y="270" font-family="Menlo, 'SF Mono', Consolas, monospace" font-size="13.5" fill="#C8E8D8">nyx serve</text>
  <text x="793" y="290" font-family="Menlo, 'SF Mono', Consolas, monospace" font-size="12" fill="#364E44">  Listening on 127.0.0.1:7890</text>
  <text x="793" y="308" font-family="Menlo, 'SF Mono', Consolas, monospace" font-size="12" fill="#364E44">  Open in browser ↗</text>

  <!-- Findings divider -->
  <rect x="777" y="330" width="341" height="1" fill="#1E2630"/>

  <!-- Findings label -->
  <text x="777" y="351" font-family="Menlo, 'SF Mono', Consolas, monospace"
        font-size="11" letter-spacing="2.5" fill="#2E4840">FINDINGS</text>

  <!-- Finding row 1 - HIGH -->
  <rect x="777" y="364" width="34" height="15" rx="3" fill="#2A1210"/>
  <text x="794" y="375" font-family="Menlo, 'SF Mono', Consolas, monospace"
        font-size="9.5" fill="#A04840" text-anchor="middle" font-weight="700">HIGH</text>
  <text x="819" y="375" font-family="Menlo, 'SF Mono', Consolas, monospace"
        font-size="12" fill="#6A8878">SQL injection  db/query.py:47</text>

  <!-- Finding row 2 - HIGH -->
  <rect x="777" y="386" width="34" height="15" rx="3" fill="#2A1210"/>
  <text x="794" y="397" font-family="Menlo, 'SF Mono', Consolas, monospace"
        font-size="9.5" fill="#A04840" text-anchor="middle" font-weight="700">HIGH</text>
  <text x="819" y="397" font-family="Menlo, 'SF Mono', Consolas, monospace"
        font-size="12" fill="#6A8878">SSRF  api/fetch.py:203</text>

  <!-- Finding row 3 - MEDIUM -->
  <rect x="777" y="408" width="40" height="15" rx="3" fill="#261E0C"/>
  <text x="797" y="419" font-family="Menlo, 'SF Mono', Consolas, monospace"
        font-size="9.5" fill="#8C7030" text-anchor="middle" font-weight="700">MED</text>
  <text x="825" y="419" font-family="Menlo, 'SF Mono', Consolas, monospace"
        font-size="12" fill="#6A8878">Path traversal  routes.js:89</text>

  <!-- Blinking cursor -->
  <rect x="777" y="440" width="8" height="15" rx="1" fill="#2E4840" opacity="0.8"/>

</svg>
